<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- CHAT SCREEN -->
  <div id="chat-screen">
    <div class="chat-wrap">

      <!-- Header -->
      <div class="chat-header">
        <div class="header-left">
          <div class="header-avatar" id="header-avatar">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="#075e54"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
          </div>
          <div class="header-info">
            <div class="header-name" id="header-name">Group Chat</div>
            <div class="header-status">
              <span class="status-dot"></span>
              <span id="online-count">online</span>
            </div>
          </div>
        </div>
        <div class="header-actions">
          <button class="icon-btn" title="Video call">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
          </button>
          <button class="icon-btn" title="Voice call">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
          </button>
          <!-- Logout button -->
          <button class="icon-btn" id="logout-btn" title="Logout">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
          </button>
        </div>
      </div>

      <!-- Messages -->
      <div class="messages" id="messages">
        <div class="date-divider"><span>TODAY</span></div>
        <div class="system-msg">🔒 Messages are end-to-end encrypted</div>
      </div>

      <!-- Emoji panel -->
      <div class="emoji-panel" id="emoji-panel">
        <span>😀</span><span>😂</span><span>😍</span><span>🥰</span><span>😎</span>
        <span>😭</span><span>😅</span><span>🤣</span><span>😊</span><span>😇</span>
        <span>🙏</span><span>👍</span><span>❤️</span><span>🔥</span><span>💯</span>
        <span>🎉</span><span>😏</span><span>🤔</span><span>😴</span><span>🥳</span>
        <span>👀</span><span>💪</span><span>✅</span><span>🚀</span><span>😤</span>
        <span>🫂</span><span>💀</span><span>😈</span><span>🤡</span><span>🫡</span>
      </div>

      <!-- Input area -->
      <div class="input-area">
        <div class="input-box">
          <button class="emoji-btn" id="emoji-btn" type="button">😊</button>
          <input type="text" id="msg-input" placeholder="Message" maxlength="500" autocomplete="off" />
          <button class="attach-btn" type="button">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
          </button>
        </div>
        <button id="send-btn">
          <svg id="send-icon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>

    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="chat.js"></script>
</body>
</html>
