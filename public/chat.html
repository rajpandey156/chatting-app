<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="chat-screen">
  <div class="app-layout">

    <!-- ══════════ SIDEBAR ══════════ -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-avatar">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
        </div>
        <span class="sidebar-my-name" id="sidebar-my-name">Me</span>
        <button class="icon-btn sidebar-delete-account" id="delete-account-btn" title="Delete Account">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M6 7h12v13a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V7zm3-3h6l1 2h4v2H4V6h4l1-2z"/></svg>
        </button>
        <button class="icon-btn sidebar-logout" id="logout-btn" title="Logout">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
        </button>
      </div>
      <div class="chat-list" id="chat-list">
        <div class="chat-item active" id="group-chat-item" data-chat="group">
          <div class="chat-item-avatar group-avatar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
          </div>
          <div class="chat-item-info">
            <div class="chat-item-name">Group Chat</div>
            <div class="chat-item-last" id="last-group">Sabka group</div>
          </div>
          <div class="badge hidden" id="badge-group"></div>
        </div>
        <!-- Ab yaha sirf online nahi, saare registered users (online + offline) dikhte hain,
             taaki offline user ko bhi msg bheja ja sake. -->
        <div class="section-label">Chats</div>
        <div id="online-list"></div>
      </div>
    </aside>

    <!-- ══════════ MAIN CHAT ══════════ -->
    <div class="chat-wrap">
      <div class="chat-header">
        <button class="icon-btn menu-toggle" id="menu-toggle">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        </button>
        <div class="header-left">
          <div class="header-avatar" id="header-avatar">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="#075e54"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
          </div>
          <div class="header-info">
            <div class="header-name" id="header-name">Group Chat</div>
            <div class="header-status">
              <span class="status-dot"></span>
              <span id="online-count">online</span>
            </div>
          </div>
        </div>
        <div class="header-actions">
          <button class="icon-btn call-btn hidden" id="voice-call-btn" title="Voice Call">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
          </button>
          <button class="icon-btn call-btn hidden" id="video-call-btn" title="Video Call">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
          </button>
          <button class="icon-btn call-btn hidden" id="block-btn" title="Block User">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zM4 12c0-4.42 3.58-8 8-8 1.85 0 3.55.63 4.9 1.69L5.69 16.9C4.63 15.55 4 13.85 4 12zm8 8c-1.85 0-3.55-.63-4.9-1.69L18.31 7.1C19.37 8.45 20 10.15 20 12c0 4.42-3.58 8-8 8z"/></svg>
          </button>
        </div>
      </div>

      <div class="messages" id="messages">
        <div class="date-divider"><span>TODAY</span></div>
        <div class="system-msg">🔒 Messages are end-to-end encrypted</div>
      </div>

      <div class="emoji-panel" id="emoji-panel">
        <span>😀</span><span>😂</span><span>😍</span><span>🥰</span><span>😎</span>
        <span>😭</span><span>😅</span><span>🤣</span><span>😊</span><span>😇</span>
        <span>🙏</span><span>👍</span><span>❤️</span><span>🔥</span><span>💯</span>
        <span>🎉</span><span>😏</span><span>🤔</span><span>😴</span><span>🥳</span>
        <span>👀</span><span>💪</span><span>✅</span><span>🚀</span><span>😤</span>
        <span>🫂</span><span>💀</span><span>😈</span><span>🤡</span><span>🫡</span>
      </div>

      <div class="input-area">
        <div class="input-box">
          <button class="emoji-btn" id="emoji-btn" type="button">😊</button>
          <input type="text" id="msg-input" placeholder="Message" maxlength="500" autocomplete="off"/>
          <!-- Media upload button -->
          <label class="attach-btn" title="Photo/Video bhejo" id="media-label">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
            <input type="file" id="media-input" accept="image/*,video/*" style="display:none"/>
          </label>
        </div>
        <button id="send-btn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>
</div>

<!-- ══════════ INCOMING CALL MODAL ══════════ -->
<div class="call-modal hidden" id="incoming-call-modal">
  <div class="call-modal-box">
    <div class="call-avatar" id="call-avatar-incoming">?</div>
    <div class="call-name" id="call-name-incoming">Unknown</div>
    <div class="call-type-label" id="call-type-label">Voice Call</div>
    <div class="call-actions">
      <button class="call-action-btn reject" id="reject-call-btn">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.12-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>
      </button>
      <button class="call-action-btn accept" id="accept-call-btn">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.12-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ══════════ ACTIVE CALL UI ══════════ -->
<div class="call-screen hidden" id="call-screen">
  <!-- Remote video (full background) -->
  <video id="remote-video" autoplay playsinline></video>
  <!-- Local video (pip) -->
  <video id="local-video" autoplay playsinline muted></video>

  <div class="call-screen-info">
    <div class="call-screen-name" id="call-screen-name">Name</div>
    <div class="call-screen-status" id="call-screen-status">Connecting...</div>
  </div>

  <div class="call-controls">
    <button class="ctrl-btn" id="mute-btn" title="Mute">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <button class="ctrl-btn" id="cam-btn" title="Camera">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
    </button>
    <button class="ctrl-btn end-call" id="end-call-btn" title="End Call">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.12-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>
    </button>
  </div>
</div>

<!-- ══════════ IMAGE LIGHTBOX ══════════ -->
<div class="lightbox hidden" id="lightbox">
  <div class="lightbox-close" id="lightbox-close">✕</div>
  <img id="lightbox-img" src="" alt=""/>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="chat.js"></script>
</body>
</html>
