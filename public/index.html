<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat App — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green:      #25d366;
      --green-dark: #128c7e;
      --teal:       #075e54;
      --bg:         #f0faf5;
      --card:       #ffffff;
      --text:       #111b21;
      --sub:        #667781;
      --border:     #e9edef;
      --error:      #e53935;
      --shadow:     0 8px 40px rgba(7,94,84,0.12);
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background-image:
        radial-gradient(ellipse 60% 50% at 80% 10%, rgba(37,211,102,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 10% 90%, rgba(7,94,84,0.10) 0%, transparent 60%);
    }

    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(37,211,102,0.1);
    }

    /* Logo */
    .logo-wrap {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 68px;
      height: 68px;
      margin: 0 auto 14px;
      background: linear-gradient(135deg, var(--green), var(--teal));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(37,211,102,0.4);
    }

    .logo-icon svg {
      width: 36px;
      height: 36px;
      fill: white;
    }

    .logo-wrap h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--teal);
      letter-spacing: -0.3px;
    }

    .logo-wrap p {
      font-size: 13px;
      color: var(--sub);
      margin-top: 4px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab-btn {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      color: var(--sub);
    }

    .tab-btn.active {
      background: var(--card);
      color: var(--teal);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    /* Forms */
    .auth-form { display: none; }
    .auth-form.visible { display: block; }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--sub);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .field input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: #fafafa;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      border-color: var(--green);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(37,211,102,0.12);
    }

    .field input::placeholder { color: #c5ccd1; }

    .submit-btn {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      color: white;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(37,211,102,0.4);
      letter-spacing: 0.2px;
    }

    .submit-btn:hover { opacity: 0.92; box-shadow: 0 6px 20px rgba(37,211,102,0.5); }
    .submit-btn:active { transform: scale(0.97); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Error / success */
    .alert {
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 13.5px;
      font-weight: 500;
      margin-bottom: 16px;
      display: none;
    }

    .alert.show { display: block; }
    .alert.error { background: #fdecea; color: var(--error); border: 1px solid #f5c6cb; }
    .alert.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }

    /* Loading spinner inside button */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      text-align: center;
      font-size: 12px;
      color: var(--sub);
      margin: 16px 0 0;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
        <path d="M36 13C23.3 13 13 23.3 13 36c0 4.1 1.1 7.9 3 11.2L13 59l12.2-3c3.1 1.7 6.7 2.7 10.7 2.7 12.7 0 23-10.3 23-23S48.7 13 36 13zm11.5 30.7c-.5 1.3-2.7 2.5-3.7 2.6-1 .1-1.9.5-6.5-1.4-5.5-2.2-9-7.7-9.3-8.1-.3-.4-2.3-3.1-2.3-5.9s1.5-4.2 2-4.7c.5-.5 1.1-.7 1.5-.7h1c.4 0 .8.1 1.1.9.5 1.1 1.7 4 1.8 4.3.1.3.2.6 0 1-.2.4-.3.6-.6.9-.3.3-.6.7-.9.9-.3.2-.6.5-.3 1 .4.5 1.7 2.8 3.7 4.5 2.5 2.2 4.7 2.9 5.3 3.2.6.3 1 .2 1.3-.1.4-.5 1.7-2 2.1-2.7.4-.7.9-.6 1.5-.4.6.2 3.8 1.8 4.4 2.1.6.3 1 .5 1.2.8.2.3.2 1.6-.3 2.8z"/>
      </svg>
    </div>
    <h1>chat-app</h1>
    <p>Apne account se continue karo</p>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Login</button>
    <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Register</button>
  </div>

  <!-- Alert -->
  <div class="alert" id="alert"></div>

  <!-- LOGIN FORM -->
  <form class="auth-form visible" id="login-form" onsubmit="handleLogin(event)">
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="aapka@email.com" required />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="••••••••" required />
    </div>
    <button class="submit-btn" type="submit" id="login-btn">Login karo</button>
    <p class="divider">Account nahi hai? Register karo ↑</p>
  </form>

  <!-- REGISTER FORM -->
  <form class="auth-form" id="register-form" onsubmit="handleRegister(event)">
    <div class="field">
      <label>Display Name</label>
      <input type="text" id="reg-name" placeholder="Tumhara naam" maxlength="20" required />
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="aapka@email.com" required />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="reg-pass" placeholder="Min. 6 characters" minlength="6" required />
    </div>
    <button class="submit-btn" type="submit" id="reg-btn">Account banao</button>
    <p class="divider">Pehle se account hai? Login karo ↑</p>
  </form>
</div>

<script>
  // Auto-redirect agar already logged in
  (async () => {
    try {
      const r = await fetch('/api/me');
      if (r.ok) window.location.href = '/chat';
    } catch {}
  })();

  function switchTab(tab) {
    document.getElementById('login-form').classList.toggle('visible', tab === 'login');
    document.getElementById('register-form').classList.toggle('visible', tab === 'register');
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    hideAlert();
  }

  function showAlert(msg, type = 'error') {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert show ${type}`;
  }

  function hideAlert() {
    document.getElementById('alert').className = 'alert';
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading
      ? `<span class="spinner"></span>Please wait...`
      : btn.id === 'login-btn' ? 'Login karo' : 'Account banao';
  }

  async function handleLogin(e) {
    e.preventDefault();
    hideAlert();
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-pass').value;
    setLoading('login-btn', true);
    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) { showAlert(data.error || 'Login failed'); return; }
      showAlert(`Welcome back, ${data.name}! 👋`, 'success');
      setTimeout(() => window.location.href = '/chat', 800);
    } catch {
      showAlert('Network error. Server chal raha hai?');
    } finally {
      setLoading('login-btn', false);
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    hideAlert();
    const name     = document.getElementById('reg-name').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-pass').value;
    setLoading('reg-btn', true);
    try {
      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();
      if (!res.ok) { showAlert(data.error || 'Registration failed'); return; }
      showAlert(`Account ban gaya, ${data.name}! 🎉`, 'success');
      setTimeout(() => window.location.href = '/chat', 800);
    } catch {
      showAlert('Network error. Server chal raha hai?');
    } finally {
      setLoading('reg-btn', false);
    }
  }
</script>
</body>
</html>
